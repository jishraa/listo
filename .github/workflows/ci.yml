# Listo QE pipeline — every layer must pass before anything ships.
# Local mirror: `npm run verify` (also runs automatically inside `npm run deploy`).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Static analysis (oxlint)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + component tests (coverage gate ≥90% lines)
        run: npm run test:coverage

      - name: Production build
        run: npm run build

      - name: Bundle budget (initial JS ≤300KB gzip)
        run: npm run check:bundle

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      # Playwright's webServer builds the app itself, so the Supabase env
      # must be present here. The auth journey uses the dedicated E2E account.
      # Visual snapshots auto-skip on CI (baselines are darwin-only for now).
      - name: E2E tests (Playwright)
        run: npx playwright test
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
