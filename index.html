<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Listo" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#04080f" />
    <script>
      // Apply the saved theme before first paint to avoid a dark flash
      (function () {
        try {
          var p = localStorage.getItem('listo-theme')
          var light = p === 'light' || (p !== 'dark' && window.matchMedia('(prefers-color-scheme: light)').matches)
          if (light) {
            document.documentElement.setAttribute('data-theme', 'light')
            var m = document.querySelector('meta[name="theme-color"]')
            if (m) m.setAttribute('content', '#f0f5fa')
          }
        } catch (e) { /* default dark */ }
      })()
    </script>
    <title>Listo</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
