<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Pinch zoom stays enabled (WCAG 1.4.4). iOS focus-zoom on inputs is
         already prevented by the 16px minimum input font size. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Listo" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#04080f" />

    <!-- SEO / social sharing -->
    <meta name="description" content="Organize shopping, tasks, travel, packing, routines, and everything in between. Free, offline-ready, and synced on every device." />
    <link rel="canonical" href="https://listo.jishraa.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Listo" />
    <meta property="og:title" content="Listo – Organize Everything That Matters" />
    <meta property="og:description" content="Organize shopping, tasks, travel, packing, routines, and everything in between. Free, offline-ready, and synced on every device." />
    <meta property="og:image" content="https://listo.jishraa.com/icon-512.png" />
    <meta property="og:url" content="https://listo.jishraa.com/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Listo – Organize Everything That Matters" />
    <meta name="twitter:description" content="Organize shopping, tasks, travel, packing, routines, and everything in between. Free, offline-ready, and synced on every device." />
    <meta name="twitter:image" content="https://listo.jishraa.com/icon-512.png" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Listo",
        "url": "https://listo.jishraa.com/",
        "applicationCategory": "Productivity",
        "operatingSystem": "Web, iOS, Android",
        "description": "Organize shopping, tasks, travel, packing, routines, and everything in between.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "publisher": { "@type": "Organization", "name": "JishRaa Labs" }
      }
    </script>
    <script>
      // Apply the saved theme before first paint to avoid a dark flash
      (function () {
        try {
          var p = localStorage.getItem('listo-theme')
          var light = p === 'light' || (p !== 'dark' && window.matchMedia('(prefers-color-scheme: light)').matches)
          if (light) {
            document.documentElement.setAttribute('data-theme', 'light')
            var m = document.querySelector('meta[name="theme-color"]')
            if (m) m.setAttribute('content', '#f0f5fa')
          }
        } catch (e) { /* default dark */ }
      })()
    </script>
    <title>Listo – Smart Lists for Everyday Life</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
