<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Native-app-like PWA: lock scale so tapping an input never triggers
         the iOS focus-zoom and the UI stays fixed on mobile. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Listo" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#04080f" />

    <!-- SEO / social sharing -->
    <meta name="description" content="Create, organize, collaborate, and track progress with Listo — the smarter list app that helps you get more done." />
    <link rel="canonical" href="https://listo.grk766.workers.dev/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Listo" />
    <meta property="og:title" content="Listo – Smart Lists for Everyday Life" />
    <meta property="og:description" content="Create, organize, collaborate, and track progress with Listo — the smarter list app that helps you get more done." />
    <meta property="og:image" content="https://listo.grk766.workers.dev/icon-512.png" />
    <meta property="og:url" content="https://listo.grk766.workers.dev/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Listo – Smart Lists for Everyday Life" />
    <meta name="twitter:description" content="Create, organize, collaborate, and track progress with Listo — the smarter list app that helps you get more done." />
    <meta name="twitter:image" content="https://listo.grk766.workers.dev/icon-512.png" />
    <script>
      // Apply the saved theme before first paint to avoid a dark flash
      (function () {
        try {
          var p = localStorage.getItem('listo-theme')
          var light = p === 'light' || (p !== 'dark' && window.matchMedia('(prefers-color-scheme: light)').matches)
          if (light) {
            document.documentElement.setAttribute('data-theme', 'light')
            var m = document.querySelector('meta[name="theme-color"]')
            if (m) m.setAttribute('content', '#f0f5fa')
          }
        } catch (e) { /* default dark */ }
      })()
    </script>
    <title>Listo – Smart Lists for Everyday Life</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
